<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200"> <title>Official CCE Register</title>
<style id="core-styles">

    thead tr:last-child th {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11pt;
        background: #fff !important;
    }
    
    /* --- 1. BASE STYLES (Clean White Look) --- */
    body {
        font-family: 'Times New Roman', serif;
        margin: 0;
        padding: 20px;
        background: #fff;
        color: #000;
    }

    /* --- 2. THE RIGID TABLE ARCHITECTURE --- */
    table {
        width: 100%;
        table-layout: fixed; /* PRO FIX: Forces all columns to fit without cutting off */
        border-collapse: collapse;
        font-size: 10pt; 
    }
    th, td {
        border: 1pt solid #000;
        padding: 4px 2px;
        text-align: center;
        vertical-align: middle;
        word-wrap: break-word;
        overflow: hidden;
    }
    
    /* REPEATS HEADER ON ALL PRINTED PAGES */
    thead { display: table-header-group; } 
    thead th { background: #f0f0f0 !important; font-weight: bold; color: #000; }
    
    .t-left { text-align: left; padding-left: 5px; font-weight: bold; }
    .v-th { height: 95px; vertical-align: bottom; padding-bottom: 5px; }
    .v-txt { writing-mode: vertical-rl; transform: rotate(180deg); display: inline-block; font-size: 9pt; font-weight: bold; white-space: nowrap; }

    /* --- 3. HEADER & BRANDING POSITIONING --- */
    .p-head {
        text-align: center;
        border-bottom: 2pt solid #000;
        margin-bottom: 15px;
        padding-bottom: 10px;
    }
    .p-school {
        font-size: 20pt;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #000;
        margin-bottom: 6px;
    }
    .p-head > div:nth-child(2) { font-size: 11pt !important; font-weight: bold; }
    
    .sig-block {
        margin-top: 60px;
        display: flex;
        justify-content: space-between;
        width: 100%;
        box-sizing: border-box;
        padding: 0 60px;
        font-size: 12pt;
        font-weight: bold;
        color: #000;
        page-break-inside: avoid;
    }
    
    .pdf-footer {
        text-align: center;
        font-size: 8.5pt;
        font-style: italic;
        color: #444;
        margin-top: 30px;
        border-top: 1pt solid #000;
        padding-top: 10px;
        page-break-inside: avoid;
    }
    .page-break { page-break-before: always; }

    /* --- 4. HARDWARE PRINT SPOOLER RULES --- */
    @media print {
        @page { size: landscape; margin: 8mm; }
        body { padding: 0; }
        .dl-btn { display: none !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }

    /* --- 5. FLOATING DOWNLOAD BUTTON --- */
    .dl-btn {
        position: fixed; bottom: 25px; right: 25px;
        background: #2563eb; color: #fff; border: 2px solid #fff;
        padding: 15px 25px; border-radius: 50px;
        font-family: sans-serif; font-size: 15px; font-weight: bold;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        cursor: pointer; z-index: 9999;
    }
    .dl-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
    <div id="print-content"></div>
    <div class="sig-block" id="sig" style="display:none;">     <span>Signature of Class Teacher</span>     <span>Signature of Headmaster</span> </div>
    <div class="pdf-footer" id="ftr" style="display:none;">Generated via Assess Offline (Digital CCE Register) | Developed by Sahil Kumar Rout</div>
    
    <button class="dl-btn" id="dl-btn" onclick="downloadPureHTML()" style="display:none;">🔵 Download HTML File</button>

       <script>
        // --- 1. THE BULLETPROOF RECEIVER ENGINE ---
        document.addEventListener("DOMContentLoaded", () => {
            const payload = localStorage.getItem('print_payload');
            const title = localStorage.getItem('print_title');

            if (payload) {
                document.getElementById('print-content').innerHTML = payload;
                document.getElementById('sig').style.display = 'flex';
                document.getElementById('ftr').style.display = 'block';
                document.getElementById('dl-btn').style.display = 'block';
                if (title) document.title = title;

                // ELITE FIX: Wait for DOM painting and layout calculations before opening spooler
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        setTimeout(() => window.print(), 350); 
                    });
                });
            } else {
                document.getElementById('print-content').innerHTML = "<h2 style='text-align:center; margin-top:50px; font-family:sans-serif;'>No data found. Please export from the main Assess Offline app.</h2>";
            }
        });

        // --- 2. THE OFFLINE DOWNLOADER ---
        function downloadPureHTML() {
            const title = document.title || 'Mark_Register';
            const payload = document.getElementById('print-content').innerHTML;
            const pageStyles = document.getElementById('core-styles').innerHTML;

            const pureHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n' +
                '<title>' + title + '</title>\n<style>\n' + pageStyles + '\n</style>\n</head>\n<body>\n' +
                payload + '\n<div class="sig-block"><span>Signature of Class Teacher</span><span>Signature of Headmaster</span></div>\n' +
                '<div class="pdf-footer">Generated via Assess Offline (Digital CCE Register) | Developed by Sahil Kumar Rout</div>\n' +
                '</body>\n</html>';

            const blob = new Blob([pureHTML], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = title + '.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }
    </script>
</body>
</html>
